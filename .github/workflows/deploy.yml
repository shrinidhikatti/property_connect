name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false   # Never cancel a running deploy

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. Build frontend for upload ────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      # ── 2. Upload frontend dist to server ───────────────────────────────────
      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/propconnect/frontend/"
          strip_components: 1

      # ── 3. Run deploy script on server ──────────────────────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/propconnect

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Backend
            ./venv/bin/pip install -q -r backend/requirements.txt
            DJANGO_SETTINGS_MODULE=config.settings.prod \
              ./venv/bin/python backend/manage.py migrate --noinput
            DJANGO_SETTINGS_MODULE=config.settings.prod \
              ./venv/bin/python backend/manage.py collectstatic --noinput --clear

            # Graceful reload
            sudo systemctl reload gunicorn
            sudo systemctl restart daphne
            sudo systemctl restart celery
            sudo systemctl restart celerybeat
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deploy complete at $(date)"

      # ── 4. Health check ─────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.DEPLOY_HOST }}/api/v1/payments/plans/")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      # ── 5. Notify on failure ─────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "❌ Production deploy FAILED on commit ${{ github.sha }} by ${{ github.actor }}"

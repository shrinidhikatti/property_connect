# /etc/nginx/sites-available/propconnect
# Symlink: ln -s /etc/nginx/sites-available/propconnect /etc/nginx/sites-enabled/

upstream django_wsgi {
    server 127.0.0.1:8000;
}

upstream django_asgi {
    server 127.0.0.1:8001;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name belagaviproperty.com www.belagaviproperty.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name belagaviproperty.com www.belagaviproperty.com;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/belagaviproperty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/belagaviproperty.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           DENY        always;
    add_header X-Content-Type-Options    nosniff     always;
    add_header Referrer-Policy           "same-origin" always;
    add_header Permissions-Policy        "geolocation=(self)" always;

    client_max_body_size 20M;

    # ── Static files (Django collectstatic output) ─────────────────────────────
    location /static/ {
        alias /var/www/propconnect/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files ────────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/propconnect/media/;
        expires 7d;
    }

    # ── Frontend dist (React SPA) ──────────────────────────────────────────────
    location / {
        root /var/www/propconnect/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache hashed frontend assets forever
    location ~* /assets/ {
        root /var/www/propconnect/frontend/dist;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket (Daphne ASGI) ────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://django_asgi;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400;
    }

    # ── Django API + admin (Gunicorn WSGI) ────────────────────────────────────
    location /api/ {
        proxy_pass          http://django_wsgi;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    location /admin/ {
        proxy_pass          http://django_wsgi;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location /api/schema/ {
        proxy_pass          http://django_wsgi;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
